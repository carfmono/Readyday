<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ReadyDay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07070F;color:#F0F0FA;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
:root{
  --bg:#07070F;--bg2:#0D0D1A;--card:#121220;--card2:#1A1A2C;
  --border:rgba(255,255,255,.07);--text:#F0F0FA;--text2:#8888A8;--text3:#4A4A6A;
  --p:#7C6EFF;--pd:rgba(124,110,255,.12);
  --g:#00D68F;--gd:rgba(0,214,143,.1);
  --y:#FFCC00;--yd:rgba(255,204,0,.1);
  --r:#FF4757;--rd:rgba(255,71,87,.1);
  --rc:16px
}
button,a{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
::-webkit-scrollbar{display:none}
*{-webkit-tap-highlight-color:transparent}

/* ── SPLASH ── */
#splash{position:fixed;top:0;right:0;bottom:0;left:0;background:var(--bg);display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;z-index:100;-webkit-transition:opacity .4s,-webkit-transform .4s;transition:opacity .4s,transform .4s}
#splash.out{opacity:0;transform:scale(.97);pointer-events:none}
.sp-logo{width:80px;height:80px;border-radius:22px;background:linear-gradient(135deg,#7C6EFF,#00D68F);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px;box-shadow:0 20px 50px rgba(124,110,255,.35);animation:logoIn .6s cubic-bezier(.22,1,.36,1) both}
@keyframes logoIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
.sp-name{font-size:26px;font-weight:900;letter-spacing:-1px;animation:fadeUp .5s .2s both}
.sp-tag{font-size:13px;color:var(--text2);margin-top:6px;animation:fadeUp .5s .35s both}
.sp-bar{width:48px;height:3px;background:linear-gradient(to right,var(--p),var(--g));border-radius:2px;margin-top:32px;animation:fadeUp .5s .5s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── ONBOARDING ── */
#onboarding{display:none;min-height:100vh;padding:0 24px;padding-top:env(safe-area-inset-top,20px)}
.ob-wrap{max-width:400px;margin:0 auto;padding-top:60px}
.ob-step-ind{display:flex;gap:6px;margin-bottom:40px}
.ob-dot{height:4px;border-radius:2px;background:var(--border);flex:1;transition:background .3s}
.ob-dot.done{background:var(--p)}
.ob-dot.active{background:linear-gradient(to right,var(--p),var(--g))}
.ob-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.ob-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.ob-option{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--rc);margin-bottom:10px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.ob-option.sel{background:var(--pd);border-color:rgba(124,110,255,.4)}
.ob-option-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0}
.ob-option-text{flex:1}
.ob-option-name{font-size:15px;font-weight:700}
.ob-option-desc{font-size:12px;color:var(--text2);margin-top:2px}
.ob-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .2s;flex-shrink:0}
.ob-option.sel .ob-check{background:var(--p);border-color:var(--p);color:#fff}
.ob-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--rc);margin-bottom:8px}
.ob-toggle-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.ob-toggle-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.ob-toggle-label{font-size:14px;font-weight:600}
.ob-toggle-desc{font-size:11px;color:var(--text2);margin-top:1px}
.toggle{width:44px;height:26px;border-radius:13px;background:var(--card2);border:1px solid var(--border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;touch-action:manipulation}
.toggle.on{background:var(--p)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(18px)}
.ob-cta{width:100%;padding:16px;background:linear-gradient(135deg,var(--p),#5A4FE0);border-radius:var(--rc);font-size:16px;font-weight:700;color:#fff;margin-top:24px;box-shadow:0 8px 24px rgba(124,110,255,.3);transition:opacity .15s;touch-action:manipulation}
.ob-cta:active{opacity:.85}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
.app-header{position:sticky;top:0;z-index:40;background:rgba(7,7,15,.88);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 20px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between}
.app-logo{font-size:16px;font-weight:900;letter-spacing:-.3px}
.app-logo span{background:linear-gradient(to right,var(--p),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.app-date{font-size:11px;color:var(--text2);text-align:right;line-height:1.4}
.app-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(7,7,15,.92);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;background:none;color:var(--text3);transition:color .2s;touch-action:manipulation}
.nav-btn.active{color:var(--p)}
.nav-icon{font-size:22px}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}

/* ── TODAY ── */
.zone-glow{min-height:100px;padding:16px 0 0;background:radial-gradient(ellipse at 50% -20%,var(--zc,rgba(124,110,255,.1)),transparent 60%);transition:background 1s}
.energy-row{display:flex;align-items:center;gap:6px;padding:0 16px 0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.energy-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;flex-shrink:0}
.e-pill{padding:6px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--text2);transition:all .2s;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.e-pill.sel{color:#fff;border-color:transparent}
.score-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 6px;position:relative}
.score-svg{width:160px;height:160px;transform:rotate(-90deg)}
.score-track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:10;stroke-linecap:round}
.score-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1),stroke .5s}
.score-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.score-num{font-size:46px;font-weight:900;letter-spacing:-3px;line-height:1;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-zone-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.hz-decision{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1.2;text-align:center;padding:0 24px;margin:4px 0 10px}
.score-rs-mini{font-size:13px;font-weight:700;color:var(--text2);margin-top:6px;letter-spacing:.2px}
.hz-insight{margin:0 16px 10px;padding:12px 14px;background:rgba(255,255,255,.04);border-radius:12px;border-left:3px solid rgba(124,110,255,.4)}
.hz-insight-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--p);margin-bottom:4px}
.hz-insight-txt{font-size:13px;line-height:1.6;color:rgba(255,255,255,.72);font-weight:500}
.pred-card{margin:0 16px 10px;background:linear-gradient(135deg,rgba(124,110,255,.07),rgba(0,214,143,.04));border:1px solid rgba(124,110,255,.18);border-radius:var(--rc);padding:12px 14px;display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:10px}
.pred-icon{font-size:18px;-webkit-flex-shrink:0;flex-shrink:0;margin-top:1px}
.rs-row{margin:0 16px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 16px;display:flex;align-items:center}
.rs-side{flex:1}
.rs-side-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:4px}
.rs-side-num{font-size:34px;font-weight:900;letter-spacing:-2px;line-height:1}
.rs-side-sub{font-size:11px;color:var(--text3);margin-top:2px}
.rs-bar-wrap{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:6px;overflow:hidden}
.rs-bar{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.rs-center{min-width:64px;text-align:center;padding:0 10px;border-left:1px solid rgba(255,255,255,.07);border-right:1px solid rgba(255,255,255,.07);margin:0 4px}
.rs-center-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:3px}
.rs-center-num{font-size:22px;font-weight:900;line-height:1}
.habits-row{padding:0 16px 8px;display:flex;gap:8px;flex-wrap:wrap}
.hab-pill{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;touch-action:manipulation}
.hab-pill.ac-red{background:rgba(255,71,87,.1);border-color:rgba(255,71,87,.3);color:#FF6B7A}
.hab-pill.ac-yel{background:rgba(255,204,0,.08);border-color:rgba(255,204,0,.2);color:var(--y)}
.hab-pill-add{padding:7px 12px;background:var(--pd);border:1px dashed rgba(124,110,255,.3);border-radius:20px;font-size:12px;font-weight:600;color:var(--p);cursor:pointer;touch-action:manipulation}
.factors-section{padding:0 16px 4px}
.factors-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.factor-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:7px;cursor:pointer;transition:background .15s;touch-action:manipulation}
.factor-row:active{background:var(--card2)}
.factor-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.factor-mid{flex:1;min-width:0}
.factor-name{font-size:13px;font-weight:700}
.factor-desc{font-size:11px;color:var(--text2);margin-top:1px}
.factor-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:5px}
.factor-bar-fill{height:100%;border-radius:2px;transition:width .8s}
.factor-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.factor-val{font-size:15px;font-weight:800}
.pred-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--p);margin-bottom:4px}
.pred-text{font-size:13px;line-height:1.55;color:rgba(255,255,255,.7)}
.actions-row{padding:0 16px 8px;display:flex;gap:10px}
.btn-primary{flex:1;padding:14px;background:linear-gradient(135deg,var(--p),#5A4FE0);border-radius:var(--rc);font-size:14px;font-weight:700;color:#fff;box-shadow:0 6px 20px rgba(124,110,255,.25);transition:opacity .15s;text-align:center;touch-action:manipulation}
.btn-primary:active{opacity:.85}
.btn-secondary{padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--rc);font-size:14px;font-weight:700;color:var(--text2);transition:opacity .15s;touch-action:manipulation}
.btn-secondary:active{opacity:.7}

/* ── TRENDS ── */
.trends-wrap{padding:16px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rc);padding:16px;margin-bottom:12px}
.chart-title{font-size:13px;font-weight:800;margin-bottom:3px}
.chart-sub{font-size:11px;color:var(--text2);margin-bottom:12px}
.spark-wrap{display:flex;align-items:flex-end;gap:4px;height:70px}
.spark-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.spark-bar{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .6s cubic-bezier(.22,1,.36,1)}
.spark-day{font-size:9px;color:var(--text3);font-weight:600}
.spark-val{font-size:9px;color:var(--text2);font-weight:700}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.metric-tile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.metric-tile-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-bottom:4px}
.metric-tile-val{font-size:22px;font-weight:900;letter-spacing:-1px}
.metric-tile-sub{font-size:11px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:4px}

/* ── SETTINGS ── */
.settings-wrap{padding:16px}
.settings-section{margin-bottom:16px}
.settings-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;padding:0 4px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--rc);margin-bottom:6px}
.setting-label{font-size:14px;font-weight:600}
.setting-desc{font-size:11px;color:var(--text2);margin-top:2px}
.seg-ctrl{display:flex;background:var(--card2);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.seg-btn{padding:7px 12px;font-size:12px;font-weight:700;color:var(--text2);background:none;transition:all .2s;touch-action:manipulation}
.seg-btn.active{background:var(--p);color:#fff}
.btn-danger{width:100%;padding:14px;background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);border-radius:var(--rc);font-size:14px;font-weight:700;color:var(--r);margin-top:8px;touch-action:manipulation}

/* ── MODALS ── */
.modal-bg{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.7);z-index:200;display:-webkit-flex;display:flex;-webkit-align-items:flex-end;align-items:flex-end;opacity:0;pointer-events:none;-webkit-transition:opacity .25s;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;background:var(--bg2);border-radius:22px 22px 0 0;padding:0 0 calc(env(safe-area-inset-bottom,0px) + 16px);max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.modal-bg.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.12);margin:12px auto 0}
.modal-header{padding:14px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:800}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--card2);font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.modal-body{padding:16px 20px}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:13px;color:var(--text2)}
.detail-val{font-size:14px;font-weight:700}
.detail-raw{font-size:11px;color:var(--text3)}
.detail-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin:14px 0 6px}
.formula-card{background:rgba(255,255,255,.04);border-radius:10px;padding:12px;font-size:11px;font-family:monospace;color:var(--p);line-height:1.8;margin-bottom:4px}
.hab-section{margin-bottom:18px}
.hab-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px}
.hab-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
.hab-row-left{flex:1}
.hab-row-name{font-size:14px;font-weight:700}
.hab-row-impact{font-size:11px;font-weight:700;color:var(--r);margin-top:2px;min-height:15px}
.stepper{display:flex;align-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;flex-shrink:0}
.step-btn{width:40px;height:40px;font-size:22px;font-weight:300;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .15s;touch-action:manipulation}
.step-btn:active{background:rgba(255,255,255,.1)}
.step-val{min-width:36px;text-align:center;font-size:16px;font-weight:800;color:var(--text)}
.time-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;margin-bottom:4px}
.time-chip{padding:7px 13px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);color:var(--text2);cursor:pointer;transition:all .2s;touch-action:manipulation}
.time-chip.sel{background:var(--pd);border-color:rgba(124,110,255,.3);color:var(--p)}
.hab-total{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:rgba(255,71,87,.07);border:1px solid rgba(255,71,87,.15);border-radius:12px;margin-bottom:16px}
.hab-total-lbl{font-size:13px;font-weight:600;color:var(--text2)}
.hab-total-val{font-size:16px;font-weight:900;color:var(--r)}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-logo">🌅</div>
  <div class="sp-name">ReadyDay</div>
  <div class="sp-tag" id="sp-tag">Know your body. Decide your day.</div>
  <div class="sp-bar"></div>
</div>

<div id="onboarding"><div class="ob-wrap" id="ob-inner"></div></div>

<div id="app">
  <div class="app-header">
    <div class="app-logo"><span>ReadyDay</span></div>
    <div class="app-date" id="app-date"></div>
  </div>
  <div id="tab-today" style="display:none"></div>
  <div id="tab-trends" style="display:none"></div>
  <div id="tab-settings" style="display:none"></div>
  <nav class="app-nav">
    <button class="nav-btn" id="nb-today" onclick="switchTab('today')">
      <div class="nav-icon">🏠</div><div class="nav-label" id="nl-today">Hoy</div>
    </button>
    <button class="nav-btn" id="nb-trends" onclick="switchTab('trends')">
      <div class="nav-icon">📈</div><div class="nav-label" id="nl-trends">Tendencias</div>
    </button>
    <button class="nav-btn" id="nb-settings" onclick="switchTab('settings')">
      <div class="nav-icon">⚙️</div><div class="nav-label" id="nl-settings">Ajustes</div>
    </button>
  </nav>
</div>

<!-- MODAL: WHY -->
<div class="modal-bg" id="modal-detail-bg" onclick="closeModal('detail')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="md-title">¿Por qué este score?</div>
      <button class="modal-close" onclick="closeModal('detail')">✕</button>
    </div>
    <div class="modal-body" id="md-body"></div>
  </div>
</div>

<!-- MODAL: HABITS -->
<div class="modal-bg" id="modal-hab-bg" onclick="closeModal('hab')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="hab-title">Hábitos de ayer</div>
      <button class="modal-close" onclick="closeModal('hab')">✕</button>
    </div>
    <div class="modal-body"><div id="hab-body"></div></div>
  </div>
</div>

<!-- MODAL: FACTOR -->
<div class="modal-bg" id="modal-factor-bg" onclick="closeModal('factor')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="mf-title">Factor</div>
      <button class="modal-close" onclick="closeModal('factor')">✕</button>
    </div>
    <div class="modal-body" id="mf-body"></div>
  </div>

<script>
(function(){
'use strict';

/* ── STORAGE ── */
var _mem={};
function stor(k,v){
  try{
    if(v===undefined)return JSON.parse(localStorage.getItem(k));
    localStorage.setItem(k,JSON.stringify(v));
  }catch(e){
    if(v===undefined)return _mem[k]||null;
    _mem[k]=v;
  }
}

/* ── STATE ── */
var state={
  lang:'es',goal:'health',onboardingDone:false,
  defaults:{caffeineLate:{cups:0,lastTime:null},alcohol:{drinks:0},lateDinner:{ate:false,time:null}},
  todayOv:{caffeineLate:null,alcohol:null,lateDinner:null},
  energyOv:null,tab:'today',obStep:1
};
function saveS(){stor('rdState',state);}
function loadS(){
  var s=stor('rdState');
  if(s){try{state=Object.assign({},state,s);}catch(e){}}
}

/* ── DATES ── */
function dAgo(n){var d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
var today=dAgo(0);
var DAY={es:['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],en:['Sun','Mon','Tue','Wed','Thu','Fri','Sat']};
function dayName(ds){var d=new Date(ds+'T12:00:00');return DAY[state.lang][d.getDay()];}

/* ── MOCK DATA ── */
var H=[
  {date:dAgo(6),bodyBattery:38,stressAvg:68,hrResting:62,sleepScore:50,sleepHours:5.8,activityLoad:82,recoveryTimeH:52,habits:{caffeineLate:{cups:1,lastTime:'16:00'},alcohol:{drinks:0},lateDinner:{ate:false,time:null}}},
  {date:dAgo(5),bodyBattery:52,stressAvg:55,hrResting:60,sleepScore:65,sleepHours:6.8,activityLoad:45,recoveryTimeH:38,habits:{caffeineLate:{cups:0,lastTime:null},alcohol:{drinks:0},lateDinner:{ate:false,time:null}}},
  {date:dAgo(4),bodyBattery:71,stressAvg:42,hrResting:58,sleepScore:78,sleepHours:7.5,activityLoad:30,recoveryTimeH:22,habits:{caffeineLate:{cups:0,lastTime:null},alcohol:{drinks:0},lateDinner:{ate:false,time:null}}},
  {date:dAgo(3),bodyBattery:83,stressAvg:35,hrResting:56,sleepScore:85,sleepHours:7.9,activityLoad:20,recoveryTimeH:14,habits:{caffeineLate:{cups:0,lastTime:null},alcohol:{drinks:0},lateDinner:{ate:false,time:null}}},
  {date:dAgo(2),bodyBattery:55,stressAvg:72,hrResting:64,sleepScore:58,sleepHours:6.1,activityLoad:75,recoveryTimeH:36,habits:{caffeineLate:{cups:0,lastTime:null},alcohol:{drinks:2},lateDinner:{ate:true,time:'23:00+'}}},
  {date:dAgo(1),bodyBattery:43,stressAvg:62,hrResting:63,sleepScore:55,sleepHours:6.4,activityLoad:68,recoveryTimeH:48,habits:{caffeineLate:{cups:3,lastTime:'18:00'},alcohol:{drinks:0},lateDinner:{ate:false,time:null}}},
  {date:today,bodyBattery:67,stressAvg:45,hrResting:59,sleepScore:74,sleepHours:7.2,activityLoad:40,recoveryTimeH:28,habits:{caffeineLate:{cups:0,lastTime:null},alcohol:{drinks:0},lateDinner:{ate:false,time:null}}}
];

/* ── ALGORITHM ── */
function clamp(v,a,b){return Math.min(b,Math.max(a,v));}
function habPen(h){
  var cups=h.caffeineLate&&typeof h.caffeineLate==='object'?h.caffeineLate.cups||0:(h.caffeineLate?2:0);
  var drinks=h.alcohol&&typeof h.alcohol==='object'?h.alcohol.drinks||0:(h.alcohol?2:0);
  var dinAte=h.lateDinner&&typeof h.lateDinner==='object'?h.lateDinner.ate||false:(!!h.lateDinner);
  var dinTime=h.lateDinner&&typeof h.lateDinner==='object'?h.lateDinner.time||'22:00':'22:00';
  var cP=Math.min(cups*8,28);
  var aP=Math.min(drinks*13,35);
  var dP=dinAte?(dinTime==='23:00+'?20:dinTime==='22:00'?13:7):0;
  return Math.min(cP+aP+dP,100);
}
function hrScore(hr){return hr<=50?100:hr<=55?90:hr<=60?75:hr<=65?55:hr<=70?35:20;}
function calcRec(d,h){
  return clamp(Math.round(.35*d.bodyBattery+.25*(100-d.stressAvg)+.20*hrScore(d.hrResting)+.20*d.sleepScore),0,100);
}
function calcStr(d,h){
  var rt=d.recoveryTimeH,rp=rt>=48?85:rt>=36?65:rt>=24?45:rt>=12?25:10;
  return clamp(Math.round(.40*d.activityLoad+.25*rp+.20*d.stressAvg+.15*habPen(h)),0,100);
}
function calcBal(rec,str){return rec-Math.round(str/2);}
function getZone(rec,bal){return(rec>=70&&bal>=20)?'green':(rec>=45)?'yellow':'red';}
function zoneColor(z){return z==='green'?'rgba(0,214,143,.13)':z==='yellow'?'rgba(255,204,0,.10)':'rgba(255,71,87,.12)';}
function zoneHex(z){return z==='green'?'#00D68F':z==='yellow'?'#FFCC00':'#FF4757';}
function zoneGrad(z){return z==='green'?'linear-gradient(135deg,#00D68F,#00B87A)':z==='yellow'?'linear-gradient(135deg,#FFCC00,#E6B800)':'linear-gradient(135deg,#FF4757,#E03444)';}
function zoneName(z){var e=state.lang==='es';return z==='green'?(e?'Óptimo':'Optimal'):z==='yellow'?(e?'Moderado':'Moderate'):(e?'Recuperación':'Recovery');}

function decision(z,d){
  var e=state.lang==='es';
  if(z==='green') return e?'Hoy entrena fuerte':'Train hard today';
  if(z==='yellow') return d.activityLoad>60?(e?'Hoy entrena suave':'Go light today'):(e?'Hoy entrena moderado':'Train moderate today');
  return e?'Hoy descansa':'Rest today';
}
function insight(z,d,h){
  var e=state.lang==='es';
  var cups=h.caffeineLate&&typeof h.caffeineLate==='object'?h.caffeineLate.cups||0:0;
  var drinks=h.alcohol&&typeof h.alcohol==='object'?h.alcohol.drinks||0:0;
  if(z==='green'){
    return e
      ?'Tus reservas están altas y el estrés bajo control. Es un buen día para dar el máximo.'
      :'Reserves are high and stress is under control. A good day to give your best.';
  }
  if(z==='yellow'){
    if(d.sleepScore<60) return e
      ?'Tu recuperación aún no es completa. Evita alta intensidad hoy. ⚠️'
      :'Your recovery isn\'t complete yet. Avoid high intensity today. ⚠️';
    if(cups>2) return e
      ?'La cafeína tardía afectó tu sueño. Moderado es lo correcto hoy.'
      :'Late caffeine affected your sleep. Moderate effort is right today.';
    if(drinks>0) return e
      ?'El alcohol de ayer redujo tu recuperación nocturna. Ve con cuidado.'
      :'Last night\'s alcohol reduced your overnight recovery. Take it easy.';
    return e
      ?'Estás listo para avanzar, pero no para exigirte al máximo.'
      :'You\'re ready to move forward, but not to push to the limit.';
  }
  if(d.bodyBattery<30) return e
    ?'Batería muy baja. El descanso de hoy es la mejor inversión para mañana.'
    :'Battery very low. Today\'s rest is the best investment for tomorrow.';
  return e
    ?'Tu cuerpo necesita recuperarse. Forzar hoy puede costarte varios días.'
    :'Your body needs to recover. Pushing today could cost you several days.';
}
function prediction(z){
  var e=state.lang==='es';
  if(z==='green') return e
    ?'Si entrenas fuerte hoy → mañana las reservas bajarán, pero habrás invertido en rendimiento real.'
    :'Train hard today → tomorrow reserves drop, but you\'ll have invested in real performance.';
  if(z==='yellow') return e
    ?'Si entrenas moderado hoy → mañana podrías mejorar tu recuperación +8 a +12 pts.'
    :'Train moderate today → tomorrow your recovery could improve +8 to +12 pts.';
  return e
    ?'Si descansas hoy → mañana podrías recuperar entre +10 y +18 puntos.'
    :'Rest today → tomorrow you could recover +10 to +18 points.';
}

/* ── HELPERS ── */
function defOn(k){
  var d=state.defaults;
  if(k==='caffeineLate') return !!(d.caffeineLate&&d.caffeineLate.cups>0);
  if(k==='alcohol') return !!(d.alcohol&&d.alcohol.drinks>0);
  if(k==='lateDinner') return !!(d.lateDinner&&d.lateDinner.ate);
  return false;
}
function getTodayHabits(){
  var td=H[H.length-1];
  var ov=state.todayOv||{};
  return {
    caffeineLate:ov.caffeineLate||td.habits.caffeineLate,
    alcohol:ov.alcohol||td.habits.alcohol,
    lateDinner:ov.lateDinner||td.habits.lateDinner
  };
}
function getTodayData(){
  var td=Object.assign({},H[H.length-1]);
  if(state.energyOv!=null){
    var emap=[15,30,50,70,88];
    td.bodyBattery=emap[state.energyOv]||50;
  }
  return td;
}
function trendArrow(hist,i){
  if(i<=0) return '<span style="color:var(--text3)">→</span>';
  var diff=hist[i]-hist[i-1];
  if(diff>2) return '<span style="color:#00D68F">↑</span>';
  if(diff<-2) return '<span style="color:#FF4757">↓</span>';
  return '<span style="color:var(--text3)">→</span>';
}

/* ── NAV ── */
function switchTab(t){
  state.tab=t;
  ['today','trends','settings'].forEach(function(k){
    document.getElementById('tab-'+k).style.display=k===t?'block':'none';
    document.getElementById('nb-'+k).className='nav-btn'+(t===k?' active':'');

  if(t==='today') renderToday();
  else if(t==='trends') renderTrends();

window.switchTab=switchTab;

function updateNavLabels(){
  var e=state.lang==='es';
  document.getElementById('nl-today').textContent=e?'Hoy':'Today';

/* ── RENDER TODAY ── */
function renderToday(){

    {k:'sleep', icon:'😴',name:e?'Sueño':'Sleep',             desc:d.sleepHours+'h · Score '+d.sleepScore,               val:d.sleepHours+'h',  pct:d.sleepScore,   color:'#4A9EFF', urgency:100-d.sleepScore},

    {k:'rt',    icon:'⏱️',name:e?'Tiempo recuperación':'Recovery time',desc:e?'Estimado Garmin':'Garmin estimate',       val:d.recoveryTimeH+'h',pct:Math.min(d.recoveryTimeH/48*100,100),color:'#00D68F', urgency:Math.min(d.recoveryTimeH*2,100)}
  ];

  }).join('');

  // Habit pills
  var cups=h.caffeineLate&&typeof h.caffeineLate==='object'?h.caffeineLate.cups||0:0;
  var drinks=h.alcohol&&typeof h.alcohol==='object'?h.alcohol.drinks||0:0;

  var habPills='';
  if(cups>0) habPills+='<div class="hab-pill ac-yel">☕ '+cups+(e?' cafés':' coffees')+' <span style="font-size:10px;opacity:.7">−'+Math.min(cups*8,28)+'pts</span></div>';
  if(drinks>0) habPills+='<div class="hab-pill ac-red">🍷 '+drinks+(e?' bebidas':' drinks')+' <span style="font-size:10px;opacity:.7">−'+Math.min(drinks*13,35)+'pts</span></div>';

  habPills+='<div class="hab-pill-add" onclick="openHab()">✏️ '+(e?'Editar':'Edit')+'</div>';

  var insightTxt=insight(z,d,h);
  var predTxt=prediction(z);

  var html=
  // 1. SCORE + ESTADO + DECISIÓN
  '<div class="zone-glow" style="--zc:'+zoneColor(z)+'">'+

      '</div>'+

/* ── RENDER TRENDS ── */
function renderTrends(){
  var e=state.lang==='es';
  var scores=H.map(function(x){
    var r=calcRec(x,x.habits),s=calcStr(x,x.habits);
    return{date:x.date,rec:r,str:s,bal:calcBal(r,s),z:getZone(r,calcBal(r,s)),bb:x.bodyBattery,sh:x.sleepHours};
  });
  var maxRec=Math.max.apply(null,scores.map(function(s){return s.rec;}))||1;
  var maxStr=Math.max.apply(null,scores.map(function(s){return s.str;}))||1;
  var zCol={green:'#00D68F',yellow:'#FFCC00',red:'#FF4757'};

  function barsRec(){return scores.map(function(s){
    var h=Math.round(s.rec/maxRec*55)+5;
    return '<div class="spark-col"><div class="spark-val">'+s.rec+'</div>'+
      '<div class="spark-bar" style="height:'+h+'px;background:'+zCol[s.z]+'"></div>'+
      '<div class="spark-day">'+dayName(s.date)+'</div></div>';
  }).join('');}
  function barsStr(){return scores.map(function(s){
    var h=Math.round(s.str/maxStr*55)+5;
    return '<div class="spark-col"><div class="spark-val">'+s.str+'</div>'+
      '<div class="spark-bar" style="height:'+h+'px;background:#FF8C42"></div>'+
      '<div class="spark-day">'+dayName(s.date)+'</div></div>';
  }).join('');}
  function barsPen(){return H.map(function(x){
    var p=habPen(x.habits);var h=Math.round(p/100*55)+2;
    var col=p>30?'#FF4757':p>10?'#FFCC00':'#00D68F';
    return '<div class="spark-col"><div class="spark-val">'+p+'</div>'+
      '<div class="spark-bar" style="height:'+h+'px;background:'+col+'"></div>'+
      '<div class="spark-day">'+dayName(x.date)+'</div></div>';
  }).join('');}

  var avgRec=Math.round(scores.reduce(function(a,s){return a+s.rec;},0)/scores.length);
  var avgStr=Math.round(scores.reduce(function(a,s){return a+s.str;},0)/scores.length);
  var avgSleep=(H.reduce(function(a,x){return a+x.sleepHours;},0)/H.length).toFixed(1);
  var avgBB=Math.round(H.reduce(function(a,x){return a+x.bodyBattery;},0)/H.length);
  var trend7=scores[6].rec>scores[0].rec+3?'↑':scores[6].rec<scores[0].rec-3?'↓':'→';

  document.getElementById('tab-trends').innerHTML=
  '<div class="trends-wrap">'+
  '<div class="chart-card">'+
    '<div class="chart-title">'+(e?'Recuperación — 7 días':'Recovery — 7 days')+'</div>'+
    '<div class="chart-sub">'+(e?'Promedio: ':'Avg: ')+avgRec+' · Tendencia: '+trend7+'</div>'+
    '<div class="spark-wrap">'+barsRec()+'</div>'+
  '</div>'+
  '<div class="chart-card">'+
    '<div class="chart-title">'+(e?'Carga (Strain) — 7 días':'Strain — 7 days')+'</div>'+
    '<div class="chart-sub">'+(e?'Promedio: ':'Avg: ')+avgStr+'</div>'+
    '<div class="spark-wrap">'+barsStr()+'</div>'+

window.toggleDef=function(k){

  if(k==='caffeineLate') d.caffeineLate={cups:defOn(k)?0:2,lastTime:defOn(k)?null:'16:00'};
  else if(k==='alcohol') d.alcohol={drinks:defOn(k)?0:1};

};
window.resetData=function(){

};

window.habStep=function(f,delta){
  if(f==='cups') _habEdits.caffeineLate.cups=Math.max(0,Math.min(5,(_habEdits.caffeineLate.cups||0)+delta));
  else _habEdits.alcohol.drinks=Math.max(0,Math.min(8,(_habEdits.alcohol.drinks||0)+delta));
  _renderHabModal();
};
window.habCafTime=function(tv){_habEdits.caffeineLate.lastTime=tv;_renderHabModal();};
window.habDin=function(v){
  _habEdits.lateDinner.ate=(v==='true'||v===true);
  if(_habEdits.lateDinner.ate&&!_habEdits.lateDinner.time) _habEdits.lateDinner.time='22:00';
  _renderHabModal();
};
window.habDinTime=function(tv){_habEdits.lateDinner.time=tv;_renderHabModal();};
window.saveHab=function(){
  state.todayOv={
    caffeineLate:{cups:_habEdits.caffeineLate.cups,lastTime:_habEdits.caffeineLate.lastTime},
    alcohol:{drinks:_habEdits.alcohol.drinks},
    lateDinner:{ate:_habEdits.lateDinner.ate,time:_habEdits.lateDinner.time}
  };
  saveS();closeModal('hab');renderToday();
};

}

window.obSetLang=function(l){state.lang=l;saveS();renderOnboarding();};
window.obSetGoal=function(g){state.goal=g;saveS();renderOnboarding();};
window.obToggleHab=function(k){
  var d=state.defaults;
  if(k==='caffeineLate') d.caffeineLate={cups:defOn(k)?0:2,lastTime:defOn(k)?null:'16:00'};
  else if(k==='alcohol') d.alcohol={drinks:defOn(k)?0:1};
  else if(k==='lateDinner') d.lateDinner={ate:!defOn(k),time:'22:00'};
  saveS();renderOnboarding();
};
window.obNext=function(){state.obStep=(state.obStep||1)+1;saveS();renderOnboarding();};
window.finishOb=function(){state.onboardingDone=true;state.obStep=1;saveS();startApp();};

/* ── START APP ── */
function startApp(){
  document.getElementById('onboarding').style.display='none';
  document.getElementById('app').style.display='block';
  updateNavLabels();
  switchTab('today');
}

/* ── BOOT — no tap needed, auto-advance ── */
function advanceSplash(){
  try{
    document.getElementById('splash').style.opacity='0';
    document.getElementById('splash').style.transform='scale(.97)';
    setTimeout(function(){
      document.getElementById('splash').style.display='none';
      try{
        if(!state.onboardingDone){
          state.obStep=state.obStep||1;
          renderOnboarding();
        } else {
          startApp();
        }
      }catch(err2){
        document.body.innerHTML='<div style="padding:24px;color:#FF4757;font-size:13px;background:#07070F;min-height:100vh;font-family:monospace"><b>Render Error</b><br><br>'+err2.message+'</div>';
      }
    },350);
  }catch(err){
    document.getElementById('splash').style.display='none';
  }
}
loadS();
setTimeout(advanceSplash,1600);

})();
</script>
</body>
</html>
